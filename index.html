        :root {
            --sidebar-width: 240px;
            --primary-color: #3b82f6;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--text-primary);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            height: 100%;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 15px;
        }

        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-item.active { background: var(--primary-color); color: white; font-weight: 600; }

        .main-content {
            flex: 1;
            padding: 40px;
            position: relative;
            z-index: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            position: relative;
            z-index: 20;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 18px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
            text-align: center;
            background: white;
            transition: all 0.3s;
            color: #333;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            transform: scale(1.02);
        }

        .search-dropdown {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .dropdown-item {
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown-item:hover { background: #f1f5f9; }
        .dropdown-item i { color: var(--primary-color); }
        .dropdown-item small { color: var(--text-secondary); display: block; font-size: 12px; margin-top: 2px; }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .clear-history { cursor: pointer; color: #ef4444; }

        .home-tip {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            opacity: 0.8;
            z-index: 1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 50px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 120px;
            text-decoration: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            text-decoration: none;
        }

        .feedback-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 14px;
        }

        .feedback-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
        }

        .qrcode-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 20;
            width: 140px;
        }

        .qrcode-box img { width: 100px; height: 100px; margin-bottom: 8px; }
        .qrcode-text { font-size: 12px; color: #666; line-height: 1.4; }

        .hidden { display: none !important; }
    </style>
</head>

            { name: "12306", url: "https://www.12306.cn", desc: "中国铁路客户服务中心", category: "life", icon: "fas fa-train" },
            { name: "支付宝", url: "https://www.alipay.com", desc: "全球领先的第三方支付", category: "life", icon: "fab fa-alipay" },
            { name: "淘宝", url: "https://www.taobao.com", desc: "淘！你喜欢", category: "life", icon: "fas fa-shopping-bag" },
            { name: "京东", url: "https://www.jd.com", desc: "多快好省的网购平台", category: "life", icon: "fas fa-shopping-cart" },

            // --- 学习教育 (10) ---
            { name: "Coursera", url: "https://www.coursera.org", desc: "提供全球顶尖大学的在线课程", category: "edu", icon: "fas fa-graduation-cap" },
            { name: "edX", url: "https://www.edx.org", desc: "由哈佛和麻省理工创办的在线学习平台", category: "edu", icon: "fas fa-university" },
            { name: "Udemy", url: "https://www.udemy.com", desc: "全球在线课程 marketplace", category: "edu", icon: "fas fa-chalkboard-teacher" },
            { name: "Khan Academy", url: "https://www.khanacademy.org", desc: "免费的世界级教育", category: "edu", icon: "fas fa-child" },
            { name: "哔哩哔哩课堂", url: "https://www.bilibili.com", desc: "学习是最好的兴趣", category: "edu", icon: "fab fa-bilibili" },
            { name: "中国大学MOOC", url: "https://www.icourse163.org", desc: "国家精品课程在线学习平台", category: "edu", icon: "fas fa-school" },
            { name: "WolframAlpha", url: "https://www.wolframalpha.com", desc: "计算知识引擎", category: "edu", icon: "fas fa-calculator" },
            { name: "Duolingo", url: "https://www.duolingo.com", desc: "免费的语言学习平台", category: "edu", icon: "fas fa-language" },
            { name: "WikiHow", url: "https://www.wikihow.com", desc: "你可以信赖的指南", category: "edu", icon: "fas fa-book-open" },
            { name: "TED", url: "https://www.ted.com", desc: "值得传播的好点子", category: "edu", icon: "fas fa-video" }
        ];

        // --- 2. 初始化 ---
        const gridContainer = document.getElementById('cardContainer');
        const searchInput = document.getElementById('searchInput');
        const searchDropdown = document.getElementById('searchDropdown');
        const homeTip = document.getElementById('homeTip');

        // 页面加载时默认显示首页（空白）
        window.onload = () => {
            renderCards([]); // 首页默认不显示卡片
        };

        // --- 3. 渲染卡片 ---
        function renderCards(items) {
            gridContainer.innerHTML = '';
            if (items.length === 0) {
                homeTip.classList.remove('hidden');
                return;
            }
            homeTip.classList.add('hidden');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = (e) => {
                    // 记录历史并跳转
                    addToHistory(item);
                    window.open(item.url, '_blank');
                };
                
                card.innerHTML = `
                    <div class="card-title"><i class="${item.icon}"></i> ${item.name}</div>
                    <div class="card-desc">${item.desc}</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // --- 4. 分类切换 ---
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                // 更新侧边栏激活状态
                navItems.forEach(el => el.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;
                
                // 隐藏搜索下拉框
                searchDropdown.style.display = 'none';
                searchInput.value = '';

                if (category === 'all') {
                    renderCards([]); // 首页不显示卡片
                } else {
                    const filtered = siteData.filter(app => app.category === category);
                    renderCards(filtered);
                }
            });
        });

        // --- 5. 搜索与历史逻辑 ---
        
        // 点击搜索框时显示历史
        searchInput.addEventListener('focus', () => {
            const history = getHistory();
            if (history.length > 0) {
                renderDropdown(history, true); // true 表示这是历史记录
            } else {
                searchDropdown.style.display = 'none';
            }
        });

        // 点击页面其他地方隐藏下拉框
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                searchDropdown.style.display = 'none';
            }
        });

        // 输入搜索内容
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.trim().toLowerCase();
            if (keyword === '') {
                // 如果清空了输入框，重新显示历史
                const history = getHistory();
                if (history.length > 0) renderDropdown(history, true);
                else searchDropdown.style.display = 'none';
                return;
            }

            // 模糊搜索 (只搜内部数据)
            const results = siteData.filter(app => 
                app.name.toLowerCase().includes(keyword) || 
                app.desc.toLowerCase().includes(keyword)
            );
            renderDropdown(results, false);
        });

        // 回车键搜索
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const keyword = e.target.value.trim().toLowerCase();
                if (!keyword) return;

                // 检查是否完全匹配某个应用名称，如果是直接跳转第一个
                const exactMatch = siteData.find(app => app.name.toLowerCase() === keyword);
                
                if (exactMatch) {
                    addToHistory(exactMatch);
                    window.open(exactMatch.url, '_blank');
                } else {
                    // 如果不匹配，不做任何操作（或者你可以提示用户）
                    // 这里保持下拉框显示“未找到”
                }
            }
        });

        function renderDropdown(items, isHistory) {
            searchDropdown.innerHTML = '';
            searchDropdown.style.display = 'flex';

            if (items.length === 0) {
                searchDropdown.innerHTML = '<div style="padding:10px; color:#999; text-align:center;">🔍 搜索失败，未找到相关收录</div>';
                return;
            }

            // 如果是历史记录，添加头部
            if (isHistory) {
                const header = document.createElement('div');
                header.className = 'history-header';
                header.innerHTML = `
                    <span><i class="fas fa-clock"></i> 最近访问</span>
                    <span class="clear-history" onclick="clearHistory(event)"><i class="fas fa-trash"></i> 清空</span>
                `;
                searchDropdown.appendChild(header);
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong>
                        <small>${item.desc}</small>
                    </div>
                    <i class="fas fa-external-link-alt"></i>
                `;
                div.onclick = (e) => {
                    e.stopPropagation();
                    addToHistory(item);
                    window.open(item.url, '_blank');
                    searchDropdown.style.display = 'none';
                    searchInput.value = '';
                };
                searchDropdown.appendChild(div);
            });
        }

        // --- 6. 历史记录管理 ---
        function addToHistory(item) {
            let history = JSON.parse(localStorage.getItem('mySearchHistory')) || [];
            // 去重：如果已存在，先移除
            history = history.filter(i => i.name !== item.name);
            // 添加到开头
            history.unshift(item);
            // 限制最多保存 10 条
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('mySearchHistory', JSON.stringify(history));
        }

        function getHistory() {
            return JSON.parse(localStorage.getItem('mySearchHistory')) || [];
        }

        // 将清空历史挂载到 window 以便 HTML 调用
        window.clearHistory = function(e) {
            e.stopPropagation(); // 阻止冒泡
            localStorage.removeItem('mySearchHistory');
            searchDropdown.style.display = 'none';
        };
    </script>
</body>
</html>
